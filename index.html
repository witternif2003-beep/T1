    :root {
      --bg-primary:  #020206;
      --bg-card:     #07070f;
      --bg-panel:    #06060d;
      --bg-admin:    #03060a;
      --border:      #12122a;
      --border-hi:   #1e1e42;
      --cyan:        #00f0ff;
      --cyan-dim:    rgba(0,240,255,0.12);
      --green:       #00ff88;
      --green-dim:   rgba(0,255,136,0.12);
      --red:         #ff3366;
      --red-dim:     rgba(255,51,102,0.12);
      --amber:       #ffaa00;
      --amber-dim:   rgba(255,170,0,0.12);
      --purple:      #a855f7;
      --purple-dim:  rgba(168,85,247,0.12);
      --orange:      #ff6b35;
      --gold:        #ffd700;

    *, *::before, *::after {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      margin: 0; padding: 0;
    }
    body {
      background: var(--bg-primary);
      color: #d8d8e8;
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      overflow-x: hidden;
      font-size: 13px;

    /* ── Animated grid ── */
    .bg-grid {
      position: fixed; top:0; left:0; width:100%; height:100%;
      background-image:
        linear-gradient(rgba(0,240,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,240,255,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none; z-index: 0;
      animation: gridScroll 25s linear infinite;
    }
    @keyframes gridScroll {
      from { background-position: 0 0; }
      to   { background-position: 0 40px; }
    }
    /* Scanline overlay for CRT admin feel */
    .bg-scanlines {
      position: fixed; top:0; left:0; width:100%; height:100%;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
      );
      pointer-events: none; z-index: 0;
    }
    #root { position: relative; z-index: 1; }

    /* ── Cards ── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 0.6rem;
      position: relative;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    .card:hover {
      border-color: rgba(0,240,255,0.3);
      box-shadow: 0 0 24px rgba(0,240,255,0.06);
    }
    .card-surge {
      border-color: rgba(0,240,255,0.45) !important;
      box-shadow: 0 0 20px rgba(0,240,255,0.1), inset 0 0 20px rgba(0,240,255,0.02) !important;
    }

    /* ── Panels ── */
    .panel {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 0.6rem;
      position: relative;
    }
    .panel-top-line::before {
      content: '';
      display: block; height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      opacity: 0.25; border-radius: 0.6rem 0.6rem 0 0;
    }

    /* Admin panel distinct styling */
    .admin-panel {
      background: var(--bg-admin);
      border: 1px solid rgba(0,240,255,0.2);
      border-radius: 0.6rem;
      box-shadow: 0 0 40px rgba(0,240,255,0.04), inset 0 0 60px rgba(0,0,20,0.5);
      position: relative;
    }
    .admin-panel::before {
      content: 'NSA ADMIN MODE — AUTHORIZED ACCESS ONLY';
      display: block;
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      color: rgba(0,240,255,0.35);
      text-align: center;
      padding: 0.35rem 0;
      border-bottom: 1px solid rgba(0,240,255,0.12);
    }

    .red    { color: var(--red);    text-shadow: 0 0 6px rgba(255,51,102,0.25); }

    .purple { color: var(--purple); }

    .gold   { color: var(--gold);   text-shadow: 0 0 8px rgba(255,215,0,0.3); }

      font-weight: 700; letter-spacing: 0.04em;

    .badge-mid      { background: var(--green-dim);           border: 1px solid var(--green);  color: var(--green); }

      width: 7px; height: 7px; flex-shrink: 0;
      border-radius: 50%; background: var(--red);

    /* ═══════════════════════════════════════════════════
       FORMATTERS
    ═══════════════════════════════════════════════════ */
    const fmtUSD = (v) => {
      const n = parseFloat(v);
      if (v == null || isNaN(n)) return "—";
      if (n === 0) return "$0.00";
      if (n < 0.000001) return `$${n.toExponential(2)}`;
      if (n < 0.0001)   return `$${n.toFixed(8)}`;
      if (n < 0.01)     return `$${n.toFixed(6)}`;
      if (n < 1)        return `$${n.toFixed(4)}`;
      return `$${n.toLocaleString(undefined, { minimumFractionDigits:2, maximumFractionDigits:2 })}`;
    };
    const fmtPct = (v) => {
      const n = parseFloat(v);
      if (v == null || isNaN(n)) return "—";
      return `${n >= 0 ? "+" : ""}${n.toFixed(2)}%`;
    };
    const fmtVol = (v) => {
      const n = parseFloat(v);
      if (v == null || isNaN(n) || n === 0) return "—";
      if (n >= 1e12) return `$${(n/1e12).toFixed(2)}T`;
      if (n >= 1e9)  return `$${(n/1e9).toFixed(2)}B`;
      if (n >= 1e6)  return `$${(n/1e6).toFixed(2)}M`;
      if (n >= 1e3)  return `$${(n/1e3).toFixed(1)}K`;
      return `$${n.toFixed(2)}`;
    };
    const fmtTime = (ts) => {
      if (!ts) return "—";
      return new Date(ts).toLocaleTimeString([], { hour12:false });
    };
    const fmtDuration = (ms) => {
      if (ms < 1000)  return `${ms}ms`;
      if (ms < 60000) return `${(ms/1000).toFixed(1)}s`;
      return `${Math.floor(ms/60000)}m ${Math.round((ms%60000)/1000)}s`;
    };

    /* ═══════════════════════════════════════════════════
       P1 SCORE ENGINE v3
       — momentum scoring (multi-TF trend alignment)
       — volatility penalty for late signals
       — buy-pressure acceleration
       — confidence-weighted dampening
    ═══════════════════════════════════════════════════ */
    const computeP1 = (pair) => {
      if (!pair) return { score:0, confidence:0, momentum:0, components:{}, flags:[], risk:"unknown" };

      const pf = (x) => x != null ? parseFloat(x) : null;
      const pc5  = pf(pair.priceChange?.m5);
      const pc1h = pf(pair.priceChange?.h1);
      const pc6h = pf(pair.priceChange?.h6);
      const pc24 = pf(pair.priceChange?.h24);
      const vm5  = pf(pair.volume?.m5);
      const vh1  = pf(pair.volume?.h1);
      const vh6  = pf(pair.volume?.h6);
      const vh24 = pf(pair.volume?.h24);
      const txm5    = (pair.txns?.m5?.buys||0) + (pair.txns?.m5?.sells||0);
      const txh1    = (pair.txns?.h1?.buys||0) + (pair.txns?.h1?.sells||0);
      const buysM5  = pair.txns?.m5?.buys  || 0;
      const sellsM5 = pair.txns?.m5?.sells || 0;
      const liq  = pf(pair.liquidity?.usd);
      const mcap = pf(pair.marketCap);
      const fdv  = pf(pair.fdv);

      /* Price score */
      let priceScore = 0;
      if (pc5 != null && !isNaN(pc5)) {
        priceScore = Math.min(100, (Math.abs(pc5) / 50) * 100);
        if (pc5 > 0 && pc1h != null && pc1h > 0) priceScore = Math.min(100, priceScore * 1.15);
        if (pc24 != null && pc24 > 300) priceScore *= 0.75;   // late-signal penalty
      }

      /* Volume surge */
      let volScore = 0;
      if (vh1 != null && vm5 != null && vh1 > 0 && vm5 > 0) {
        volScore = Math.min(100, (vm5 / (vh1 / 12)) * 50);
      }
      if (vh24 != null && vh6 != null && vh24 > 0 && vh6 > 0) {
        if (vh6 / (vh24 / 4) > 1.2) volScore = Math.min(100, volScore * 1.1);
      }
      if (vm5 != null && vh1 != null && vh1 > 0) {
        if (vm5 / (vh1 / 12) > 2) volScore = Math.min(100, volScore * 1.15);
      }

      /* TX velocity + buy pressure */
      let txScore = 0;
      if (txh1 > 0 && txm5 > 0) txScore = Math.min(100, (txm5 / (txh1 / 12)) * 50);
      const buyRatio = sellsM5 > 0 ? buysM5 / sellsM5 : (buysM5 > 0 ? 3 : 1);
      if (buyRatio > 1.5 && txScore > 0) txScore = Math.min(100, txScore * 1.1);
      if (buyRatio > 4.0)                txScore = Math.min(100, txScore * 1.25);

      /* Liquidity / MC */
      let liqScore = 0;
      if (liq != null && mcap != null && mcap > 0) {
        liqScore = Math.min(100, (liq / mcap) * 500);
      } else if (liq != null && liq > 0) {
        liqScore = Math.min(100, (Math.log10(liq) / 5) * 100);
      }

      /* MC/FDV */
      let mcScore = 0;
      if (fdv != null && mcap != null && fdv > 0) mcScore = Math.min(100, (mcap / fdv) * 100);

      /* Momentum — multi-timeframe alignment */
      let momentumScore = 0;
      const trendWindows = [pc5, pc1h, pc6h, pc24].filter(x => x != null && !isNaN(x));
      if (trendWindows.length >= 2) {
        const positiveCount = trendWindows.filter(x => x > 0).length;
        momentumScore = (positiveCount / trendWindows.length) * 100;
        if (pc5 != null && pc1h != null && pc5 > 0 && pc1h > 0 && pc5 > pc1h / 12)
          momentumScore = Math.min(100, momentumScore * 1.2);
      }

      /* Weighted composite */
      const weighted = (priceScore    * 0.25)
                     + (volScore      * 0.22)
                     + (liqScore      * 0.18)
                     + (txScore       * 0.15)
                     + (mcScore       * 0.10)
                     + (momentumScore * 0.10);

      /* Confidence */
      const available = [
        pc5 != null && !isNaN(pc5),
        vm5 != null && vh1 != null,
        liq != null,
        txm5 > 0 || txh1 > 0,
        fdv != null && mcap != null,
        pc6h != null || pc24 != null,
      ].filter(Boolean).length;
      const confidence = Math.round((available / 6) * 100);

      /* Confidence-weighted dampening */
      const confidenceFactor = 0.6 + (confidence / 100) * 0.4;
      const finalScore = Math.min(100, Math.round(weighted * confidenceFactor));

      /* Risk */
      let risk = "medium";
      if (liqScore < 15 || (mcap != null && mcap < 1e6))    risk = "high";
      else if (liqScore > 60 && mcap != null && mcap > 1e9) risk = "low";

      /* Signal flags */
      const flags = [];
      if (finalScore > 85 && confidence >= 65)            flags.push("🔥 Imminent Surge");
      else if (finalScore > 70 && confidence >= 60)       flags.push("⚡ Surge Candidate");
      if (buyRatio > 2.0  && txScore > 60)               flags.push("🟢 Buy Pressure");
      if (volScore > 80   && priceScore > 60)            flags.push("📈 Vol-Price Align");
      if (momentumScore > 75)                            flags.push("🚀 Multi-TF Momentum");
      if (liqScore < 20   && finalScore > 50)            flags.push("⚠️ Low Liquidity");
      if (pc24 != null && pc24 > 300 && finalScore > 50) flags.push("⏰ Late Signal");

      return {
        score: finalScore,
        confidence,
        momentum: Math.round(momentumScore),
        components: {
          price:     { score: Math.round(priceScore),    label: "Price Δ m5"   },
          volume:    { score: Math.round(volScore),      label: "Volume Surge" },
          liquidity: { score: Math.round(liqScore),      label: "Liquidity"    },
          txCount:   { score: Math.round(txScore),       label: "TX Velocity"  },
          marketCap: { score: Math.round(mcScore),       label: "MC/FDV"       },
          momentum:  { score: Math.round(momentumScore), label: "Momentum"     },
        },
        flags,
        risk,
        buyRatio: Math.round(buyRatio * 10) / 10,
      };
    };

    /* ═══════════════════════════════════════════════════
       NETWORK — rate-limit guard, dual-proxy fallback,
       response integrity check, per-request timing
    ═══════════════════════════════════════════════════ */
    async function fetchWithRetry(url, opts={}, maxRetries=2) {
      const delays = [1500, 4000];
      let lastErr = "Unknown error", latency = 0;
      for (let i = 0; i < maxRetries; i++) {
        const t0 = Date.now();
        try {
          const ctrl  = new AbortController();
          const timer = setTimeout(() => ctrl.abort(), 10000);
          const res   = await fetch(url, {
            ...opts,
            signal:  ctrl.signal,
            headers: { "Cache-Control": "no-cache", ...(opts.headers || {}) },
          });
          clearTimeout(timer);
          latency = Date.now() - t0;
          if (!res.ok) throw new Error(`HTTP ${res.status} ${res.statusText}`);
          const data = await res.json();
          // integrity: must be non-null object or array
          if (typeof data !== "object" || data === null) throw new Error("Non-object response");
          return { ok:true, data, latency };
        } catch (e) {
          latency = Date.now() - t0;
          lastErr = e.name === "AbortError" ? "Request timed out after 10s" : (e.message || String(e));
          if (i < maxRetries - 1) await new Promise(r => setTimeout(r, delays[i]));
        }
      }
      return { ok:false, error:lastErr, latency };
    }

    function classifyError(err) {
      const e = (err || "").toLowerCase();
      if (e.includes("cors") || e.includes("failed to fetch") || e.includes("load failed") ||
          e.includes("blocked") || e.includes("cross-origin") || e.includes("not allowed")) return "cors";
      if (e.includes("network") || e.includes("offline") || e.includes("connection"))        return "network";
      if (e.includes("timed out") || e.includes("timeout") || e.includes("abort"))           return "timeout";
      if (e.includes("http 4") || e.includes("http 5"))                                      return "http";
      if (e.includes("non-object") || e.includes("json"))                                    return "parse";
      return "unknown";
    }

    async function fetchAllEndpoints(logFn) {
      if (!RateLimit.check()) {
        logFn("warn", `Rate limit hit — ${RateLimit.resetIn()}s until reset`);
        return { ok:false, error:`Rate limited — wait ${RateLimit.resetIn()}s`, latency:0 };
      }
      for (const [name, url] of Object.entries(ENDPOINTS)) {
        logFn("info", `Trying endpoint: ${name}`);
        const result = await fetchWithRetry(url);
        if (result.ok) {
          logFn("ok", `${name} → ${result.latency}ms (direct)`);
          return { ...result, source: name, proxied: false };
        }
        logFn("warn", `${name} failed (${classifyError(result.error)}) — trying proxies`);
        for (const proxy of PROXIES) {
          logFn("info", `Proxy: ${proxy.split("?")[0]}`);
          const pr = await fetchWithRetry(proxy + encodeURIComponent(url));
          if (pr.ok) {
            logFn("ok", `Proxy success → ${pr.latency}ms`);
            return { ...pr, source: name, proxied: true };
          }
          logFn("warn", `Proxy failed: ${pr.error}`);
        }
      }
      return { ok:false, error:"All endpoints and proxies exhausted" };
    }

    /* Normalise any DexScreener response shape into pairs[] */
    function normalisePairs(data) {
      if (!data) return [];
      const mapItem = (p) => ({
        baseToken:   { address: p.tokenAddress || p.address || "", symbol: p.symbol || "?", name: p.name || p.symbol || "?" },
        priceUsd:    p.priceUsd   || "0",
        priceChange: p.priceChange || {},
        volume:      p.volume     || {},
        txns:        p.txns       || {},
        liquidity:   p.liquidity  || {},
        marketCap:   p.marketCap,
        fdv:         p.fdv,
        pairAddress: p.pairAddress || p.tokenAddress || "",
        dexId:       p.dexId       || "unknown",
        chainId:     "solana",
      });
      if (Array.isArray(data.pairs)) return data.pairs.filter(p => p?.baseToken);
      if (Array.isArray(data.data))  return data.data.filter(p => p?.baseToken || p?.tokenAddress).map(mapItem);
      if (Array.isArray(data))       return data.filter(p => p?.baseToken || p?.tokenAddress).map(mapItem);
      return [];
    }

    /* ═══════════════════════════════════════════════════
       WEBGL CAPABILITY DETECTION
    ═══════════════════════════════════════════════════ */
    const WebGLSupport = (() => {
      try {
        const c  = document.createElement("canvas");
        const gl = c.getContext("webgl2") || c.getContext("webgl");
        if (!gl) return { ok:false, version:"none", renderer:"—" };
        const dbg = gl.getExtension("WEBGL_debug_renderer_info");
        return {
          ok:       true,
          version:  c.getContext("webgl2") ? "WebGL2" : "WebGL1",
          renderer: dbg ? gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) : "unknown",
        };
      } catch { return { ok:false, version:"error", renderer:"—" }; }
    })();

    /* ═══════════════════════════════════════════════════
       THREE.JS 3D VOLUME TELEMETRY
    ═══════════════════════════════════════════════════ */
    function Telemetry3D({ tokens }) {
      const mountRef = useRef(null);
      useEffect(() => {
        const el = mountRef.current;
        if (!el) return;
        if (!WebGLSupport.ok) {
          el.innerHTML = `<div style="color:#555;font-size:0.7rem;padding:1.5rem;text-align:center">WebGL not available (${WebGLSupport.version})</div>`;
          return;
        }
        if (typeof THREE === "undefined") {
          el.innerHTML = `<div style="color:#555;font-size:0.7rem;padding:1.5rem;text-align:center">Three.js failed to load</div>`;
          return;
        }

        const W = el.clientWidth || 600, H = el.clientHeight || 320;
        const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true, powerPreference:"low-power" });
        renderer.setSize(W, H);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
        renderer.setClearColor(0x000000, 0);
        el.appendChild(renderer.domElement);

        const scene  = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(48, W / H, 0.1, 200);
        camera.position.set(0, 9, 20);
        camera.lookAt(0, 1, 0);

        scene.add(new THREE.AmbientLight(0x001133, 1.5));
        const dl = new THREE.DirectionalLight(0x00f0ff, 0.7);
        dl.position.set(6, 12, 8);
        scene.add(dl);
        const dl2 = new THREE.DirectionalLight(0xa855f7, 0.4);
        dl2.position.set(-6, 6, -4);
        scene.add(dl2);
        scene.add(new THREE.GridHelper(24, 24, 0x12122a, 0x12122a));

        const sorted = [...tokens]
          .sort((a, b) => (parseFloat(b.volume?.h1)||0) - (parseFloat(a.volume?.h1)||0))
          .slice(0, 6);
        const maxVol = sorted.reduce((m, t) => Math.max(m, parseFloat(t.volume?.h1)||0), 1);
        const COLORS = [0x00f0ff, 0xa855f7, 0x00ff88, 0xffaa00, 0xff3366, 0xff6b35];
        const disposables = [];

        sorted.forEach((tok, i) => {
          const p1  = computeP1(tok);
          const vol = parseFloat(tok.volume?.h1) || 0;
          const h   = Math.max(0.2, (vol / maxVol) * 7);
          const col = COLORS[i % COLORS.length];
          const x   = (i - (sorted.length - 1) / 2) * 3.5;

          const geo  = new THREE.BoxGeometry(1.4, h, 1.4);
          const mat  = new THREE.MeshPhongMaterial({ color:col, emissive:col, emissiveIntensity:0.25, transparent:true, opacity:0.82 });
          const mesh = new THREE.Mesh(geo, mat);
          mesh.position.set(x, h / 2, 0);
          scene.add(mesh);
          disposables.push(geo, mat);

          const sh    = Math.max(0.1, (p1.score / 100) * 5);
          const sgeo  = new THREE.BoxGeometry(0.25, sh, 0.25);
          const smat  = new THREE.MeshPhongMaterial({ color:0xffffff, emissive:0xffffff, emissiveIntensity:0.8, transparent:true, opacity:0.55 });
          const smesh = new THREE.Mesh(sgeo, smat);
          smesh.position.set(x, h + sh / 2 + 0.05, 0);
          scene.add(smesh);
          disposables.push(sgeo, smat);

          if (p1.momentum > 70) {
            const rgeo  = new THREE.TorusGeometry(0.9, 0.06, 6, 18);
            const rmat  = new THREE.MeshPhongMaterial({ color:0xff6b35, emissive:0xff6b35, emissiveIntensity:0.6, transparent:true, opacity:0.7 });
            const rmesh = new THREE.Mesh(rgeo, rmat);
            rmesh.position.set(x, h + 0.1, 0);
            rmesh.rotation.x = Math.PI / 2;
            scene.add(rmesh);
            disposables.push(rgeo, rmat);
          }
        });

        let frameId, angle = 0;
        const animate = () => {
          frameId = requestAnimationFrame(animate);
          angle += 0.003;
          camera.position.x = Math.sin(angle) * 20;
          camera.position.z = Math.cos(angle) * 20;
          camera.lookAt(0, 2, 0);
          renderer.render(scene, camera);
        };
        animate();

        const onResize = () => {
          const W2 = el.clientWidth, H2 = el.clientHeight;
          if (!W2 || !H2) return;
          camera.aspect = W2 / H2;
          camera.updateProjectionMatrix();
          renderer.setSize(W2, H2);
        };
        window.addEventListener("resize", onResize);

        return () => {
          cancelAnimationFrame(frameId);
          window.removeEventListener("resize", onResize);
          disposables.forEach(d => d.dispose?.());
          renderer.dispose();
          if (el.contains(renderer.domElement)) el.removeChild(renderer.domElement);
        };
      }, [tokens]);
      return <div ref={mountRef} className="telemetry-container" />;
    }

    /* ═══════════════════════════════════════════════════
       LOG REDUCER
    ═══════════════════════════════════════════════════ */
    const MAX_LOGS = 80;
    function logReducer(state, action) {
      if (action.type === "add")   return [{ t: Date.now(), level: action.level, msg: action.msg }, ...state].slice(0, MAX_LOGS);
      if (action.type === "clear") return [];
      return state;
    }

          {expanded && (
            <div className="mb-3" style={{ borderTop:"1px solid var(--border)", paddingTop:"0.5rem" }}>
              <table className="diag-table">
                <tbody>
                  <tr><td>Buy Ratio (5m)</td><td className={p1.buyRatio >= 2 ? "green" : p1.buyRatio < 1 ? "red" : ""}>{p1.buyRatio}x</td></tr>
                  <tr><td>Confidence</td><td className="cyan">{p1.confidence}%</td></tr>
                  <tr><td>Momentum</td><td className="orange">{p1.momentum}/100</td></tr>
                  <tr><td>Risk Level</td><td><RiskBadge risk={p1.risk} /></td></tr>
                  <tr><td>DEX</td><td className="muted">{pair.dexId}</td></tr>
                  <tr><td>FDV</td><td className="mono-value">{fmtVol(pair.fdv)}</td></tr>
                  <tr><td>Address</td><td className="muted truncate" style={{ maxWidth:110, fontSize:"0.58rem" }}>{addr}</td></tr>
                </tbody>
              </table>
            </div>
          )}

          {p1.flags.length > 0 && (
            <div className="flex flex-wrap gap-1 mb-3">
              {p1.flags.map(f => (
                <span key={f} className="text-xs" style={{
                  background:"rgba(0,240,255,0.05)", border:"1px solid rgba(0,240,255,0.18)",
                  borderRadius:"0.2rem", padding:"0.08rem 0.35rem"
                }}>{f}</span>
              ))}
            </div>
          )}

          <div className="flex justify-between items-center">
            <div className="flex gap-2 text-xs">
              <a href={DEXSCREENER_PAIR(pair.pairAddress)} target="_blank" rel="noreferrer" className="cyan">DEX ↗</a>
              <a href={BIRDEYE_URL(addr)}                  target="_blank" rel="noreferrer" className="purple">Bird ↗</a>
              <a href={SOLSCAN_URL(addr)}                  target="_blank" rel="noreferrer" className="green">Scan ↗</a>
              <a href={RUGCHECK_URL(addr)}                 target="_blank" rel="noreferrer" className="amber">Rug ↗</a>
              <a href={GMGN_URL(addr)}                     target="_blank" rel="noreferrer" className="orange">GMGN ↗</a>
            </div>
            <button onClick={() => setExpanded(v => !v)}
              className="btn btn-cyan" style={{ padding:"0.1rem 0.5rem", fontSize:"0.6rem" }}>
              {expanded ? "▲" : "▼"}
            </button>
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════
       ADMIN DIAGNOSTICS PANEL
    ═══════════════════════════════════════════════════ */
    function AdminPanel({ stats, logs, onClearLogs, onForceRefresh, tokens }) {
      const logRef = useRef(null);
      const [tick, setTick] = useState(0);

      useEffect(() => {
        if (logRef.current) logRef.current.scrollTop = 0;
      }, [logs]);

      // Live uptime tick
      useEffect(() => {
        const id = setInterval(() => setTick(t => t + 1), 1000);
        return () => clearInterval(id);
      }, []);

      return (
        <div className="admin-panel p-4 mb-4">
          <div className="grid-2 gap-4 mb-3">
            {/* System */}
            <div>
              <div className="text-xs amber mb-2" style={{ letterSpacing:"0.1em" }}>◈ SYSTEM</div>
              <table className="diag-table">
                <tbody>
                  <tr><td>Session ID</td><td className="cyan">{SESSION.id}</td></tr>
                  <tr><td>JWT Token</td><td className="muted text-xs truncate" style={{ maxWidth:120, fontSize:"0.55rem" }}>{SESSION.token.slice(0,28)}…</td></tr>
                  <tr><td>App Version</td><td>{VERSION.app}</td></tr>
                  <tr><td>P1 Engine</td><td className="green">{VERSION.p1}</td></tr>
                  <tr><td>React</td><td>{VERSION.react}</td></tr>
                  <tr><td>Three.js</td><td>{VERSION.three}</td></tr>
                  <tr><td>WebGL</td><td className={WebGLSupport.ok ? "green" : "red"}>{WebGLSupport.version}</td></tr>
                  <tr><td>GPU</td><td className="muted truncate" style={{ maxWidth:120, fontSize:"0.6rem" }}>{WebGLSupport.renderer || "—"}</td></tr>
                  <tr><td>Uptime</td><td>{fmtDuration(SESSION.uptime * 1000)}</td></tr>
                </tbody>
              </table>
            </div>
            {/* Network */}
            <div>
              <div className="text-xs amber mb-2" style={{ letterSpacing:"0.1em" }}>◈ NETWORK</div>
              <table className="diag-table">
                <tbody>
                  <tr><td>Data Source</td><td className="cyan">{stats.source || "—"}</td></tr>
                  <tr><td>Proxied</td><td className={stats.proxied ? "amber" : "green"}>{stats.proxied ? "YES" : "NO"}</td></tr>
                  <tr><td>Latency</td><td className="mono-value">{stats.latency != null ? `${stats.latency}ms` : "—"}</td></tr>
                  <tr><td>Fetch Count</td><td>{stats.fetchCount}</td></tr>
                  <tr><td>Errors</td><td className={stats.errorCount > 0 ? "red" : "green"}>{stats.errorCount}</td></tr>
                  <tr><td>Rate Limit</td><td className={RateLimit.remaining() < 5 ? "red" : "amber"}>{RateLimit.remaining()}/30 rem ({RateLimit.resetIn()}s)</td></tr>
                  <tr><td>Tokens Loaded</td><td className="cyan">{tokens.length}</td></tr>
                  <tr><td>Last Fetch</td><td className="muted">{fmtTime(stats.lastFetch)}</td></tr>
                  <tr><td>Endpoints</td><td className="muted">{Object.keys(ENDPOINTS).length} primary, {PROXIES.length} proxy</td></tr>
                </tbody>
              </table>
            </div>
          </div>
          <div className="text-xs amber mb-1" style={{ letterSpacing:"0.1em" }}>◈ EVENT LOG</div>
          <div className="log-window" ref={logRef}>
            {logs.length === 0
              ? <span className="dim">— no events —</span>
              : logs.map((l, i) => (
                <div key={i} className={`log-${l.level}`}>
                  [{new Date(l.t).toISOString().slice(11,19)}] {l.msg}
                </div>
              ))
            }
          </div>
          <div className="flex gap-2 mt-2">
            <button className="btn btn-cyan"  onClick={onForceRefresh}>↺ Force Fetch</button>
            <button className="btn btn-amber" onClick={onClearLogs}>✕ Clear Log</button>
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════
       MAIN APP
    ═══════════════════════════════════════════════════ */
    function App() {
      const [tokens,        setTokens]        = useState([]);
      const [loading,       setLoading]       = useState(true);
      const [error,         setError]         = useState(null);
      const [errorType,     setErrorType]     = useState(null);
      const [isMock,        setIsMock]        = useState(false);
      const [isStale,       setIsStale]       = useState(false);
      const [refreshSec,    setRefreshSec]    = useState(30);
      const [minP1,         setMinP1]         = useState(0);
      const [sortKey,       setSortKey]       = useState("p1");
      const [showTelemetry, setShowTelemetry] = useState(false);
      const [showAdmin,     setShowAdmin]     = useState(false);
      const [elapsed,       setElapsed]       = useState(null);
      const [fetchStats,    setFetchStats]    = useState({
        source:"—", proxied:false, latency:null, fetchCount:0, errorCount:0, lastFetch:null,
      });
      const [logs, dispatchLog] = useReducer(logReducer, []);
      const log = useCallback((level, msg) => dispatchLog({ type:"add", level, msg }), []);

      const timerRef    = useRef(null);
      const staleRef    = useRef(null);
      const tickRef     = useRef(null);
      const lastFetchTs = useRef(null);

      const fetchTokens = useCallback(async () => {
        setLoading(true);
        setError(null); setErrorType(null);
        setIsMock(false); setIsStale(false);
        clearTimeout(staleRef.current);
        log("admin", `Fetch #${fetchStats.fetchCount + 1} — session ${SESSION.id}`);

        const result = await fetchAllEndpoints(log);

        setFetchStats(prev => ({
          source:     result.source || "—",
          proxied:    result.proxied || false,
          latency:    result.latency || null,
          fetchCount: prev.fetchCount + 1,
          errorCount: result.ok ? prev.errorCount : prev.errorCount + 1,
          lastFetch:  Date.now(),
        }));

        if (result.ok) {
          const pairs = normalisePairs(result.data);
          if (pairs.length > 0) {
            setTokens(pairs);
            lastFetchTs.current = Date.now();
            setLoading(false);
            staleRef.current = setTimeout(() => setIsStale(true), refreshSec * 2 * 1000);
            log("ok", `Loaded ${pairs.length} tokens from ${result.source}${result.proxied ? " (proxied)" : ""} — LIVE DATA`);
            return;
          }
          log("warn", "Response OK but 0 valid pairs — falling back to mock");
        } else {
          log("err", `All sources failed: ${result.error}`);
        }

        const et = classifyError(result?.error);
        setError(result?.error || "No data");
        setErrorType(et);
        setIsMock(true);
        setTokens(MOCK_TOKENS);
        lastFetchTs.current = Date.now();
        setLoading(false);
        log("warn", `Mock data active — type: ${et}`);
      }, [refreshSec, fetchStats.fetchCount, log]);

      useEffect(() => { fetchTokens(); }, []);  // eslint-disable-line

      useEffect(() => {
        clearInterval(timerRef.current);
        timerRef.current = setInterval(fetchTokens, refreshSec * 1000);
        return () => clearInterval(timerRef.current);
      }, [fetchTokens, refreshSec]);

      useEffect(() => {
        tickRef.current = setInterval(() => {
          if (lastFetchTs.current) setElapsed(Math.round((Date.now() - lastFetchTs.current) / 1000));
        }, 1000);
        return () => { clearInterval(tickRef.current); clearTimeout(staleRef.current); };
      }, []);

      const processed = useMemo(() => tokens
        .map(t => ({ ...t, _p1: computeP1(t) }))
        .filter(t => t._p1.score >= minP1)
        .sort((a, b) => {
          if (sortKey === "p1")       return b._p1.score     - a._p1.score;
          if (sortKey === "vol")      return (parseFloat(b.volume?.h24)||0) - (parseFloat(a.volume?.h24)||0);
          if (sortKey === "price")    return (parseFloat(b.priceChange?.m5)||0) - (parseFloat(a.priceChange?.m5)||0);
          if (sortKey === "liq")      return (parseFloat(b.liquidity?.usd)||0) - (parseFloat(a.liquidity?.usd)||0);
          if (sortKey === "momentum") return b._p1.momentum  - a._p1.momentum;
          return 0;
        }), [tokens, minP1, sortKey]);

      const topP1      = processed[0]?._p1?.score ?? 0;
      const avgP1      = processed.length ? Math.round(processed.reduce((s,t) => s + t._p1.score, 0) / processed.length) : 0;
      const surgeCount = processed.filter(t => t._p1.score >= 70).length;
      const momCount   = processed.filter(t => t._p1.momentum > 70).length;

      const errorLabel = {
        cors:"CORS blocked", network:"No network", timeout:"Timed out",
        http:"Server error", parse:"Parse error", unknown:"Unknown"
      }[errorType] || errorType;

      const dotClass = loading ? "dot-warn" : isMock ? "dot-dead" : "dot-live";

      return (
        <div style={{ maxWidth:1140, margin:"0 auto", padding:"0.75rem 0.75rem 3rem" }}>

          {/* ── Header ── */}
          <div className="flex items-center justify-between mb-3"
               style={{ paddingTop:"0.5rem", flexWrap:"wrap", gap:"0.5rem" }}>
            <div>
              <h1 className="text-2xl font-bold surge-glow cyan" style={{ letterSpacing:"-0.5px" }}>
                ◈ SOLANA SURGE SCANNER
              </h1>
              <div className="flex items-center gap-2 mt-1 text-xs muted">
                <div className={dotClass} />
                {loading
                  ? <span className="amber">Fetching…</span>
                  : isMock
                    ? <span className="red">DEMO DATA</span>
                    : <span className="green">LIVE</span>
                }
                <span className="dim">·</span>
                <span>{processed.length} tokens</span>
                <span className="dim">·</span>
                <span>P1 {VERSION.p1}</span>
                {elapsed != null && !loading && <><span className="dim">·</span><span>{elapsed}s ago</span></>}
              </div>
            </div>
            <div className="flex gap-2">
              <button className="btn btn-purple" onClick={() => setShowAdmin(v => !v)}>
                {showAdmin ? "▼ Admin" : "▲ Admin"}
              </button>
              <button className="btn btn-cyan" onClick={fetchTokens} disabled={loading}>
                {loading ? "Loading…" : "↺ Refresh"}
              </button>
            </div>
          </div>

          {/* ── Banners ── */}
          {isMock && (
            <div className="banner banner-mock">
              <strong className="purple">⚠ DEMO MODE</strong>
              {" — Live API unavailable"}
              {errorLabel && <span className="muted"> ({errorLabel})</span>}
              {". Displaying illustrative mock data — NOT live financial data."}
            </div>
          )}
          {!isMock && fetchStats.proxied && (
            <div className="banner banner-cors">
              <strong className="cyan">ℹ CORS PROXY</strong>
              {` — via proxy · source: ${fetchStats.source} · ${fetchStats.latency}ms · LIVE DATA`}
            </div>
          )}
          {isStale && !loading && (
            <div className="banner banner-stale">
              <strong className="amber">⏱ STALE</strong>
              {` — No update in ${refreshSec * 2}s — check connection or lower refresh interval`}
            </div>
          )}
          {!isMock && !fetchStats.proxied && !loading && (
            <div className="banner banner-ok">
              <strong className="green">✓ LIVE DATA</strong>
              {` — ${fetchStats.source} · ${fetchStats.latency}ms · ${fmtTime(fetchStats.lastFetch)} — Verified DexScreener`}
            </div>
          )}

          {/* ── Admin Panel ── */}
          {showAdmin && (
            <AdminPanel
              stats={fetchStats}
              logs={logs}
              tokens={tokens}
              onClearLogs={() => dispatchLog({ type:"clear" })}
              onForceRefresh={fetchTokens}
            />
          )}

          {/* ── Stats strip ── */}
          <div className="grid-4 mb-3">
            {[
              { label:"Top P1",        value: topP1,      color:"var(--cyan)"   },
              { label:"Avg P1",        value: avgP1,      color:"var(--purple)" },
              { label:"Surge Alerts",  value: surgeCount, color:"var(--green)"  },
              { label:"High Momentum", value: momCount,   color:"var(--orange)" },
            ].map(s => (
              <div key={s.label} className="panel p-3 text-center">
                <div className="panel-top-line" />
                <div className="text-xl font-bold" style={{ color:s.color, marginTop:"0.25rem" }}>{s.value}</div>
                <div className="text-xs muted mt-1">{s.label}</div>
              </div>
            ))}
          </div>

          {/* ── Controls ── */}
          <div className="panel p-4 mb-3">
            <div className="panel-top-line" />
            <div className="grid-3" style={{ marginTop:"0.5rem" }}>
              <div>
                <label className="text-xs muted" style={{ display:"block", marginBottom:"0.3rem" }}>Sort by</label>
                <select value={sortKey} onChange={e => setSortKey(e.target.value)}>
                  <option value="p1">P1 Score</option>
                  <option value="momentum">Momentum</option>
                  <option value="vol">Volume 24h</option>
                  <option value="price">Price Δ 5m</option>
                  <option value="liq">Liquidity</option>
                </select>
              </div>
              <div>
                <label className="text-xs muted" style={{ display:"block", marginBottom:"0.3rem" }}>
                  Min P1: <span className="cyan">{minP1}</span>
                </label>
                <input type="range" min="0" max="90" step="5" value={minP1}
                  onChange={e => setMinP1(Number(e.target.value))} />
              </div>
              <div>
                <label className="text-xs muted" style={{ display:"block", marginBottom:"0.3rem" }}>
                  Refresh: <span className="cyan">{refreshSec}s</span>
                </label>
                <input type="range" min="10" max="120" step="5" value={refreshSec}
                  onChange={e => setRefreshSec(Number(e.target.value))} />
              </div>
            </div>
            <div className="flex gap-2 mt-3" style={{ flexWrap:"wrap" }}>
              <button className={`btn ${showTelemetry ? "btn-purple" : "btn-cyan"}`}
                onClick={() => setShowTelemetry(v => !v)}>
                {showTelemetry ? "▼ Hide 3D" : "▲ Show 3D Telemetry"}
              </button>
              <span className="text-xs muted" style={{ alignSelf:"center" }}>
                Rate limit: <span className={RateLimit.remaining() < 5 ? "red" : "amber"}>{RateLimit.remaining()}</span>/30 req remaining
              </span>
            </div>
          </div>

          {/* ── 3D Telemetry ── */}
          {showTelemetry && tokens.length > 0 && (
            <div className="mb-3">
              <div className="text-xs muted mb-1">
                3D volume chart · top 6 by h1 vol · white needle = P1 score · orange torus = high momentum (>70)
              </div>
              <Telemetry3D tokens={tokens} />
            </div>
          )}

          {/* ── Token grid ── */}
          {loading && tokens.length === 0 ? (
            <div className="panel p-6 text-center cyan">
              <div className="text-lg mb-2 surge-glow">◈</div>
              <div className="text-xs" style={{ color:"var(--amber)" }}>Scanning Solana network…</div>
              <div className="text-xs muted mt-2">Trying {Object.keys(ENDPOINTS).length} endpoints with {PROXIES.length} proxy fallbacks</div>
            </div>
          ) : processed.length === 0 ? (
            <div className="panel p-6 text-center muted">
              No tokens match Min P1 ≥ {minP1}. Lower the threshold.
            </div>
          ) : (
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(295px, 1fr))", gap:"0.65rem" }}>
              {processed.map((pair, i) => (
                <TokenCard
                  key={pair.pairAddress || pair.baseToken?.address || i}
                  pair={pair}
                  rank={i + 1}
                />
              ))}
            </div>
          )}

          {/* ── Footer ── */}
          <div className="text-xs muted mt-4" style={{ textAlign:"center", opacity:0.35 }}>
            Solana Surge Scanner {VERSION.app} · P1 {VERSION.p1} · Data: DexScreener API ·
            Session: {SESSION.id} · Not financial advice
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
