<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="Solana Surge Scanner — NSA Admin Edition" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self' 'unsafe-inline' 'unsafe-eval'
             https://unpkg.com https://cdnjs.cloudflare.com
             https://api.dexscreener.com https://corsproxy.io
             https://api.allorigins.win https://api.anthropic.com;
             img-src 'self' data: https:;" />
  <title>Solana Surge Scanner — NSA Admin</title>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <style>
    :root {
      --bg-primary: #020206;
      --bg-card:    #07070f;
      --bg-panel:   #06060d;
      --bg-admin:   #03060a;
      --border:     #12122a;
      --border-hi:  #1e1e42;
      --cyan:       #00f0ff;
      --cyan-dim:   rgba(0,240,255,0.12);
      --green:      #00ff88;
      --green-dim:  rgba(0,255,136,0.12);
      --red:        #ff3366;
      --red-dim:    rgba(255,51,102,0.12);
      --amber:      #ffaa00;
      --amber-dim:  rgba(255,170,0,0.12);
      --purple:     #a855f7;
      --purple-dim: rgba(168,85,247,0.12);
      --orange:     #ff6b35;
      --gold:       #ffd700;
    }

    *, *::before, *::after { box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0; }

    body {
      background: var(--bg-primary);
      color: #d8d8e8;
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      overflow-x: hidden;
      font-size: 13px;
    }

    /* ── Animated grid + scanlines ── */
    .bg-grid {
      position:fixed; top:0; left:0; width:100%; height:100%;
      background-image:
        linear-gradient(rgba(0,240,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,240,255,0.025) 1px, transparent 1px);
      background-size:40px 40px;
      pointer-events:none; z-index:0;
      animation:gridScroll 25s linear infinite;
    }
    @keyframes gridScroll { from{background-position:0 0} to{background-position:0 40px} }

    .bg-scanlines {
      position:fixed; top:0; left:0; width:100%; height:100%;
      background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);
      pointer-events:none; z-index:0;
    }
    #root { position:relative; z-index:1; }

    /* ── Cards ── */
    .card {
      background:var(--bg-card); border:1px solid var(--border);
      border-radius:.6rem; position:relative;
      transition:border-color .18s, box-shadow .18s;
    }
    .card:hover { border-color:rgba(0,240,255,.3); box-shadow:0 0 24px rgba(0,240,255,.06); }
    .card-surge {
      border-color:rgba(0,240,255,.45)!important;
      box-shadow:0 0 20px rgba(0,240,255,.1),inset 0 0 20px rgba(0,240,255,.02)!important;
    }

    /* ── Panels ── */
    .panel { background:var(--bg-panel); border:1px solid var(--border); border-radius:.6rem; position:relative; }
    .panel-top-line::before {
      content:''; display:block; height:1px;
      background:linear-gradient(90deg,transparent,var(--cyan),transparent);
      opacity:.25; border-radius:.6rem .6rem 0 0;
    }

    /* ── Admin panel ── */
    .admin-panel {
      background:var(--bg-admin); border:1px solid rgba(0,240,255,.2); border-radius:.6rem;
      box-shadow:0 0 40px rgba(0,240,255,.04),inset 0 0 60px rgba(0,0,20,.5); position:relative;
    }
    .admin-panel::before {
      content:'NSA ADMIN MODE — AUTHORIZED ACCESS ONLY';
      display:block; font-size:.55rem; letter-spacing:.2em;
      color:rgba(0,240,255,.35); text-align:center;
      padding:.35rem 0; border-bottom:1px solid rgba(0,240,255,.12);
    }

    /* ── Typography ── */
    .cyan   { color:var(--cyan);   text-shadow:0 0 8px rgba(0,240,255,.35); }
    .green  { color:var(--green);  text-shadow:0 0 8px rgba(0,255,136,.25); }
    .red    { color:var(--red);    text-shadow:0 0 6px rgba(255,51,102,.25); }
    .amber  { color:var(--amber); }
    .purple { color:var(--purple); }
    .orange { color:var(--orange); }
    .gold   { color:var(--gold);   text-shadow:0 0 8px rgba(255,215,0,.3); }
    .muted  { color:#555; }
    .dim    { color:#333; }

    /* ── Badges ── */
    .badge { font-size:.6rem; padding:.1rem .38rem; border-radius:.2rem; white-space:nowrap; font-weight:700; letter-spacing:.04em; }
    .badge-high     { background:var(--cyan-dim);       border:1px solid var(--cyan);   color:var(--cyan); }
    .badge-mid      { background:var(--green-dim);      border:1px solid var(--green);  color:var(--green); }
    .badge-low      { background:var(--amber-dim);      border:1px solid var(--amber);  color:var(--amber); }
    .badge-admin    { background:var(--purple-dim);     border:1px solid var(--purple); color:var(--purple); }
    .badge-danger   { background:var(--red-dim);        border:1px solid var(--red);    color:var(--red); }
    .badge-momentum { background:rgba(255,107,53,.12);  border:1px solid var(--orange); color:var(--orange); }

    /* ── Status dots ── */
    .dot-live { width:7px; height:7px; flex-shrink:0; border-radius:50%; background:var(--green); animation:pulseGlow 2.5s cubic-bezier(.4,0,.6,1) infinite; }
    .dot-warn { width:7px; height:7px; flex-shrink:0; border-radius:50%; background:var(--amber); animation:pulseGlow 1.2s cubic-bezier(.4,0,.6,1) infinite; }
    .dot-dead { width:7px; height:7px; flex-shrink:0; border-radius:50%; background:var(--red); }
    @keyframes pulseGlow { 0%,100%{opacity:1;box-shadow:0 0 10px currentColor} 50%{opacity:.5;box-shadow:0 0 3px currentColor} }

    /* ── Banners ── */
    .banner { border-radius:.4rem; padding:.55rem .8rem; font-size:.68rem; margin-bottom:.65rem; }
    .banner-err   { background:var(--red-dim);    border:1px solid var(--red); }
    .banner-cors  { background:var(--cyan-dim);   border:1px solid rgba(0,240,255,.3); }
    .banner-stale { background:var(--amber-dim);  border:1px solid var(--amber); }
    .banner-ok    { background:var(--green-dim);  border:1px solid rgba(0,255,136,.3); }

    /* ── Error screen ── */
    .error-screen {
      background:var(--bg-card); border:1px solid rgba(255,51,102,.3);
      border-radius:.6rem; padding:2rem 1.5rem; text-align:center;
      box-shadow:0 0 30px rgba(255,51,102,.06);
    }
    .error-icon { font-size:2rem; margin-bottom:.75rem; }
    .error-code { font-size:.65rem; color:#555; margin-top:1rem; font-family:'Courier New',monospace; }

    /* ── Title glow ── */
    .surge-glow { animation:surgePulse 2s ease-in-out infinite alternate; }
    @keyframes surgePulse {
      from { text-shadow:0 0 5px var(--cyan),0 0 10px var(--cyan); }
      to   { text-shadow:0 0 18px var(--cyan),0 0 36px var(--cyan),0 0 55px var(--purple); }
    }

    /* ── Neon bars ── */
    .neon-bar {
      height:4px; border-radius:2px;
      background:linear-gradient(90deg,var(--cyan),var(--purple));
      box-shadow:0 0 5px rgba(0,240,255,.2);
      transition:width .4s ease; min-width:2px;
    }
    .neon-bar-green { background:linear-gradient(90deg,var(--green),#00d4a0); box-shadow:0 0 5px rgba(0,255,136,.2); }

    /* ── Three.js ── */
    .telemetry-container { width:100%; height:320px; border-radius:.6rem; overflow:hidden; border:1px solid var(--border); background:#010104; }
    .telemetry-container canvas { display:block; width:100%!important; }

    /* ── Diagnostics table ── */
    .diag-table { width:100%; border-collapse:collapse; font-size:.68rem; }
    .diag-table td { padding:.25rem .5rem; border-bottom:1px solid var(--border); }
    .diag-table td:first-child { color:#555; width:42%; }
    .diag-table tr:last-child td { border-bottom:none; }

    /* ── Log window ── */
    .log-window {
      background:#010104; border:1px solid var(--border); border-radius:.4rem;
      padding:.6rem; font-size:.62rem; height:140px; overflow-y:auto;
      color:#555; line-height:1.6;
    }
    .log-window .log-ok    { color:var(--green); }
    .log-window .log-warn  { color:var(--amber); }
    .log-window .log-err   { color:var(--red); }
    .log-window .log-info  { color:var(--cyan); }
    .log-window .log-admin { color:var(--purple); }

    /* ── Controls ── */
    input[type="number"], input[type="text"], select {
      background:#05050d; border:1px solid var(--border-hi); color:#d8d8e8;
      padding:.38rem .55rem; border-radius:.4rem; width:100%;
      font-family:inherit; font-size:.75rem;
      transition:border-color .18s, box-shadow .18s;
      -webkit-appearance:none; appearance:none;
    }
    input:focus, select:focus { outline:none; border-color:var(--cyan); box-shadow:0 0 8px rgba(0,240,255,.1); }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance:none; }
    input[type="range"] { -webkit-appearance:auto; appearance:auto; accent-color:var(--cyan); width:100%; cursor:pointer; }

    button { transition:all .15s ease; cursor:pointer; font-family:inherit; border:none; }
    button:active { transform:scale(.94); }
    button:disabled { cursor:not-allowed; opacity:.4; }

    .btn { border-radius:.4rem; font-size:.72rem; font-weight:600; padding:.38rem .9rem; letter-spacing:.03em; }
    .btn-cyan   { background:rgba(0,240,255,.1);  border:1px solid rgba(0,240,255,.3);  color:var(--cyan); }
    .btn-green  { background:rgba(0,255,136,.1);  border:1px solid rgba(0,255,136,.3);  color:var(--green); }
    .btn-red    { background:rgba(255,51,102,.1); border:1px solid rgba(255,51,102,.3); color:var(--red); }
    .btn-purple { background:rgba(168,85,247,.1); border:1px solid rgba(168,85,247,.3); color:var(--purple); }
    .btn-amber  { background:rgba(255,170,0,.1);  border:1px solid rgba(255,170,0,.3);  color:var(--amber); }
    .btn-cyan:hover   { background:rgba(0,240,255,.18);  box-shadow:0 0 12px rgba(0,240,255,.1); }
    .btn-green:hover  { background:rgba(0,255,136,.18);  box-shadow:0 0 12px rgba(0,255,136,.1); }
    .btn-red:hover    { background:rgba(255,51,102,.18); box-shadow:0 0 12px rgba(255,51,102,.1); }
    .btn-purple:hover { background:rgba(168,85,247,.18); box-shadow:0 0 12px rgba(168,85,247,.1); }

    /* ── Layout ── */
    .flex            { display:flex; }
    .flex-wrap       { flex-wrap:wrap; }
    .items-center    { align-items:center; }
    .justify-between { justify-content:space-between; }
    .gap-1 { gap:.25rem; } .gap-2 { gap:.5rem; } .gap-3 { gap:.75rem; } .gap-4 { gap:1rem; }
    .p-3 { padding:.75rem; } .p-4 { padding:1rem; } .p-5 { padding:1.25rem; } .p-6 { padding:1.5rem; }
    .mt-1 { margin-top:.25rem; } .mt-2 { margin-top:.5rem; } .mt-3 { margin-top:.75rem; } .mt-4 { margin-top:1rem; }
    .mb-1 { margin-bottom:.25rem; } .mb-2 { margin-bottom:.5rem; } .mb-3 { margin-bottom:.75rem; } .mb-4 { margin-bottom:1rem; }
    .text-xs   { font-size:.68rem; } .text-sm   { font-size:.78rem; }
    .text-base { font-size:.88rem; } .text-lg   { font-size:1.05rem; }
    .text-xl   { font-size:1.25rem; } .text-2xl  { font-size:1.5rem; }
    .font-bold { font-weight:700; }
    .truncate  { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .text-center { text-align:center; }
    .mono-value  { font-family:'Courier New',monospace; letter-spacing:.02em; }

    .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:.65rem; }
    .grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:.65rem; }
    .grid-4 { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:.65rem; }

    ::-webkit-scrollbar { width:4px; height:4px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:#1e1e3a; border-radius:2px; }
    ::-webkit-scrollbar-thumb:hover { background:#2a2a5e; }

    @media (max-width:768px) { .grid-3,.grid-4 { grid-template-columns:1fr 1fr; } }
    @media (max-width:480px) { .grid-2,.grid-3,.grid-4 { grid-template-columns:1fr; } .hide-mobile { display:none!important; } }
    @media (prefers-reduced-motion:reduce) { .bg-grid,.surge-glow,.dot-live,.dot-warn { animation:none; } }

    a { text-decoration:none; }
    a:hover { text-decoration:underline; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-scanlines"></div>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo, useReducer } = React;

    /* ═══════════════════════════════════
       VERSION MANIFEST
    ═══════════════════════════════════ */
    const VERSION = { app:"3.1.0-nsa", p1:"v3", react:"18.3.1", babel:"7.24.7", three:"r128", built:new Date().toISOString() };

    /* ═══════════════════════════════════
       JWT-STYLE EPHEMERAL SESSION TOKEN
       tab-scoped only — no localStorage/cookie
    ═══════════════════════════════════ */
    const SESSION = (() => {
      const b64 = o => btoa(JSON.stringify(o)).replace(/\+/g,"-").replace(/\//g,"_").replace(/=/g,"");
      const sid = Math.random().toString(36).slice(2,10).toUpperCase();
      const iat = Math.floor(Date.now()/1000);
      return {
        id:    sid,
        token: `${b64({alg:"HS256-NSA",typ:"JWT"})}.${b64({sub:"nsa-admin",sid,iat,iss:"surge-scanner"})}.${b64({v:VERSION.app})}`,
        started: Date.now(),
        get uptime() { return Math.round((Date.now()-this.started)/1000); },
      };
    })();

    /* ═══════════════════════════════════
       RATE-LIMIT TRACKER — 30 req/min
    ═══════════════════════════════════ */
    const RateLimit = (() => {
      let hits=0, resetAt=Date.now()+60000;
      const MAX=30;
      return {
        check()     { if(Date.now()>resetAt){hits=0;resetAt=Date.now()+60000;} if(hits>=MAX)return false; hits++; return true; },
        remaining() { return Date.now()>resetAt?MAX:Math.max(0,MAX-hits); },
        resetIn()   { return Math.max(0,Math.round((resetAt-Date.now())/1000)); },
      };
    })();

    /* ═══════════════════════════════════
       ENDPOINTS + PROXY CHAIN
    ═══════════════════════════════════ */
    const ENDPOINTS = {
      boosted: "https://api.dexscreener.com/token-boosts/latest/v1",
      pairs:   "https://api.dexscreener.com/latest/dex/search?q=solana&limit=30",
      primary: "https://api.dexscreener.com/token-profiles/latest/v1",
      gainers: "https://api.dexscreener.com/latest/dex/tokens/trending",
    };
    const PROXIES = [
      "https://corsproxy.io/?url=",
      "https://api.allorigins.win/raw?url=",
    ];

    const SOLSCAN_URL      = a => `https://solscan.io/token/${a}`;
    const BIRDEYE_URL      = a => `https://birdeye.so/token/${a}?chain=solana`;
    const DEXSCREENER_PAIR = a => `https://dexscreener.com/solana/${a}`;
    const RUGCHECK_URL     = a => `https://rugcheck.xyz/tokens/${a}`;
    const GMGN_URL         = a => `https://gmgn.ai/sol/token/${a}`;

    /* ═══════════════════════════════════
       FORMATTERS
    ═══════════════════════════════════ */
    const fmtUSD = v => {
      const n=parseFloat(v);
      if(v==null||isNaN(n))return"—";
      if(n===0)return"$0.00";
      if(n<0.000001)return`$${n.toExponential(2)}`;
      if(n<0.0001)return`$${n.toFixed(8)}`;
      if(n<0.01)return`$${n.toFixed(6)}`;
      if(n<1)return`$${n.toFixed(4)}`;
      return`$${n.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}`;
    };
    const fmtPct = v => { const n=parseFloat(v); if(v==null||isNaN(n))return"—"; return`${n>=0?"+":""}${n.toFixed(2)}%`; };
    const fmtVol = v => {
      const n=parseFloat(v);
      if(v==null||isNaN(n)||n===0)return"—";
      if(n>=1e12)return`$${(n/1e12).toFixed(2)}T`;
      if(n>=1e9)return`$${(n/1e9).toFixed(2)}B`;
      if(n>=1e6)return`$${(n/1e6).toFixed(2)}M`;
      if(n>=1e3)return`$${(n/1e3).toFixed(1)}K`;
      return`$${n.toFixed(2)}`;
    };
    const fmtTime = ts => ts ? new Date(ts).toLocaleTimeString([],{hour12:false}) : "—";
    const fmtDuration = ms => {
      if(ms<1000)return`${ms}ms`;
      if(ms<60000)return`${(ms/1000).toFixed(1)}s`;
      return`${Math.floor(ms/60000)}m ${Math.round((ms%60000)/1000)}s`;
    };

    /* ═══════════════════════════════════
       P1 SCORE ENGINE v3
       6 components · confidence dampening
       · momentum (multi-TF) · late-signal penalty
       · buy-pressure acceleration
    ═══════════════════════════════════ */
    const computeP1 = pair => {
      if(!pair) return{score:0,confidence:0,momentum:0,components:{},flags:[],risk:"unknown",buyRatio:1};
      const pf = x => x!=null ? parseFloat(x) : null;
      const pc5=pf(pair.priceChange?.m5), pc1h=pf(pair.priceChange?.h1);
      const pc6h=pf(pair.priceChange?.h6), pc24=pf(pair.priceChange?.h24);
      const vm5=pf(pair.volume?.m5), vh1=pf(pair.volume?.h1);
      const vh6=pf(pair.volume?.h6), vh24=pf(pair.volume?.h24);
      const txm5=(pair.txns?.m5?.buys||0)+(pair.txns?.m5?.sells||0);
      const txh1=(pair.txns?.h1?.buys||0)+(pair.txns?.h1?.sells||0);
      const buysM5=pair.txns?.m5?.buys||0, sellsM5=pair.txns?.m5?.sells||0;
      const liq=pf(pair.liquidity?.usd), mcap=pf(pair.marketCap), fdv=pf(pair.fdv);

      // Price score
      let priceScore=0;
      if(pc5!=null&&!isNaN(pc5)){
        priceScore=Math.min(100,(Math.abs(pc5)/50)*100);
        if(pc5>0&&pc1h!=null&&pc1h>0) priceScore=Math.min(100,priceScore*1.15);
        if(pc24!=null&&pc24>300) priceScore*=0.75;  // late-signal penalty
      }

      // Volume surge
      let volScore=0;
      if(vh1!=null&&vm5!=null&&vh1>0&&vm5>0) volScore=Math.min(100,(vm5/(vh1/12))*50);
      if(vh24!=null&&vh6!=null&&vh24>0&&vh6>0&&vh6/(vh24/4)>1.2) volScore=Math.min(100,volScore*1.1);
      if(vm5!=null&&vh1!=null&&vh1>0&&vm5/(vh1/12)>2) volScore=Math.min(100,volScore*1.15);

      // TX velocity + buy pressure
      let txScore=0;
      if(txh1>0&&txm5>0) txScore=Math.min(100,(txm5/(txh1/12))*50);
      const buyRatio=sellsM5>0?buysM5/sellsM5:(buysM5>0?3:1);
      if(buyRatio>1.5&&txScore>0) txScore=Math.min(100,txScore*1.1);
      if(buyRatio>4.0) txScore=Math.min(100,txScore*1.25);

      // Liquidity / MC
      let liqScore=0;
      if(liq!=null&&mcap!=null&&mcap>0) liqScore=Math.min(100,(liq/mcap)*500);
      else if(liq!=null&&liq>0) liqScore=Math.min(100,(Math.log10(liq)/5)*100);

      // MC/FDV
      let mcScore=0;
      if(fdv!=null&&mcap!=null&&fdv>0) mcScore=Math.min(100,(mcap/fdv)*100);

      // Momentum — multi-timeframe alignment
      let momentumScore=0;
      const tw=[pc5,pc1h,pc6h,pc24].filter(x=>x!=null&&!isNaN(x));
      if(tw.length>=2){
        momentumScore=(tw.filter(x=>x>0).length/tw.length)*100;
        if(pc5!=null&&pc1h!=null&&pc5>0&&pc1h>0&&pc5>pc1h/12)
          momentumScore=Math.min(100,momentumScore*1.2);
      }

      // Weighted composite
      const weighted = priceScore*0.25 + volScore*0.22 + liqScore*0.18
                     + txScore*0.15   + mcScore*0.10  + momentumScore*0.10;

      // Confidence from data completeness
      const available=[
        pc5!=null&&!isNaN(pc5), vm5!=null&&vh1!=null,
        liq!=null, txm5>0||txh1>0,
        fdv!=null&&mcap!=null, pc6h!=null||pc24!=null,
      ].filter(Boolean).length;
      const confidence=Math.round((available/6)*100);

      const finalScore=Math.min(100,Math.round(weighted*(0.6+(confidence/100)*0.4)));

      let risk="medium";
      if(liqScore<15||(mcap!=null&&mcap<1e6)) risk="high";
      else if(liqScore>60&&mcap!=null&&mcap>1e9) risk="low";

      const flags=[];
      if(finalScore>85&&confidence>=65)           flags.push("🔥 Imminent Surge");
      else if(finalScore>70&&confidence>=60)      flags.push("⚡ Surge Candidate");
      if(buyRatio>2.0&&txScore>60)               flags.push("🟢 Buy Pressure");
      if(volScore>80&&priceScore>60)             flags.push("📈 Vol-Price Align");
      if(momentumScore>75)                       flags.push("🚀 Multi-TF Momentum");
      if(liqScore<20&&finalScore>50)             flags.push("⚠️ Low Liquidity");
      if(pc24!=null&&pc24>300&&finalScore>50)    flags.push("⏰ Late Signal");

      return {
        score:finalScore, confidence, momentum:Math.round(momentumScore),
        components:{
          price:    {score:Math.round(priceScore),    label:"Price Δ m5"   },
          volume:   {score:Math.round(volScore),      label:"Volume Surge" },
          liquidity:{score:Math.round(liqScore),      label:"Liquidity"    },
          txCount:  {score:Math.round(txScore),       label:"TX Velocity"  },
          marketCap:{score:Math.round(mcScore),       label:"MC/FDV"       },
          momentum: {score:Math.round(momentumScore), label:"Momentum"     },
        },
        flags, risk, buyRatio:Math.round(buyRatio*10)/10,
      };
    };

    /* ═══════════════════════════════════
       NETWORK — rate-limit guard · dual-proxy fallback
       · response integrity check · timing telemetry
    ═══════════════════════════════════ */
    async function fetchWithRetry(url, opts={}, maxRetries=2) {
      const delays=[1500,4000]; let lastErr="Unknown error", latency=0;
      for(let i=0;i<maxRetries;i++){
        const t0=Date.now();
        try{
          const ctrl=new AbortController();
          const timer=setTimeout(()=>ctrl.abort(),10000);
          const res=await fetch(url,{...opts,signal:ctrl.signal,headers:{"Cache-Control":"no-cache",...(opts.headers||{})}});
          clearTimeout(timer);
          latency=Date.now()-t0;
          if(!res.ok) throw new Error(`HTTP ${res.status} ${res.statusText}`);
          const data=await res.json();
          // integrity: reject null / non-object
          if(typeof data!=="object"||data===null) throw new Error("Non-object response");
          return{ok:true,data,latency};
        }catch(e){
          latency=Date.now()-t0;
          lastErr=e.name==="AbortError"?"Request timed out after 10s":(e.message||String(e));
          if(i<maxRetries-1) await new Promise(r=>setTimeout(r,delays[i]));
        }
      }
      return{ok:false,error:lastErr,latency};
    }

    function classifyError(err){
      const e=(err||"").toLowerCase();
      if(e.includes("cors")||e.includes("failed to fetch")||e.includes("load failed")||e.includes("blocked")||e.includes("cross-origin")||e.includes("not allowed")) return"cors";
      if(e.includes("network")||e.includes("offline")||e.includes("connection")) return"network";
      if(e.includes("timed out")||e.includes("timeout")||e.includes("abort")) return"timeout";
      if(e.includes("http 4")||e.includes("http 5")) return"http";
      if(e.includes("non-object")||e.includes("json")) return"parse";
      return"unknown";
    }

    async function fetchAllEndpoints(logFn){
      if(!RateLimit.check()){
        logFn("warn",`Rate limit hit — ${RateLimit.resetIn()}s until reset`);
        return{ok:false,error:`Rate limited — wait ${RateLimit.resetIn()}s`,latency:0};
      }
      for(const[name,url] of Object.entries(ENDPOINTS)){
        logFn("info",`Trying: ${name}`);
        const r=await fetchWithRetry(url);
        if(r.ok){ logFn("ok",`${name} → ${r.latency}ms (direct)`); return{...r,source:name,proxied:false}; }
        logFn("warn",`${name} failed (${classifyError(r.error)}) — trying proxies`);
        for(const proxy of PROXIES){
          logFn("info",`Proxy: ${proxy.split("?")[0]}`);
          const pr=await fetchWithRetry(proxy+encodeURIComponent(url));
          if(pr.ok){ logFn("ok",`Proxy → ${pr.latency}ms`); return{...pr,source:name,proxied:true}; }
          logFn("warn",`Proxy failed: ${pr.error}`);
        }
      }
      return{ok:false,error:"All endpoints and proxies exhausted"};
    }

    /* Normalise DexScreener response → pairs[] */
    function normalisePairs(data){
      if(!data)return[];
      const mapItem=p=>({
        baseToken:{address:p.tokenAddress||p.address||"",symbol:p.symbol||"?",name:p.name||p.symbol||"?"},
        priceUsd:p.priceUsd||"0", priceChange:p.priceChange||{},
        volume:p.volume||{}, txns:p.txns||{},
        liquidity:p.liquidity||{}, marketCap:p.marketCap, fdv:p.fdv,
        pairAddress:p.pairAddress||p.tokenAddress||"",
        dexId:p.dexId||"unknown", chainId:"solana",
      });
      if(Array.isArray(data.pairs)) return data.pairs.filter(p=>p?.baseToken);
      if(Array.isArray(data.data))  return data.data.filter(p=>p?.baseToken||p?.tokenAddress).map(mapItem);
      if(Array.isArray(data))       return data.filter(p=>p?.baseToken||p?.tokenAddress).map(mapItem);
      return[];
    }

    /* ═══════════════════════════════════
       WEBGL CAPABILITY DETECTION
    ═══════════════════════════════════ */
    const WebGLSupport=(()=>{
      try{
        const c=document.createElement("canvas");
        const gl=c.getContext("webgl2")||c.getContext("webgl");
        if(!gl)return{ok:false,version:"none",renderer:"—"};
        const dbg=gl.getExtension("WEBGL_debug_renderer_info");
        return{ok:true,version:c.getContext("webgl2")?"WebGL2":"WebGL1",renderer:dbg?gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL):"unknown"};
      }catch{return{ok:false,version:"error",renderer:"—"};}
    })();

    /* ═══════════════════════════════════
       THREE.JS 3D VOLUME TELEMETRY
    ═══════════════════════════════════ */
    function Telemetry3D({tokens}){
      const mountRef=useRef(null);
      useEffect(()=>{
        const el=mountRef.current; if(!el)return;
        if(!WebGLSupport.ok){ el.innerHTML=`<div style="color:#555;font-size:.7rem;padding:1.5rem;text-align:center">WebGL not available (${WebGLSupport.version})</div>`; return; }
        if(typeof THREE==="undefined"){ el.innerHTML=`<div style="color:#555;font-size:.7rem;padding:1.5rem;text-align:center">Three.js failed to load</div>`; return; }

        const W=el.clientWidth||600, H=el.clientHeight||320;
        const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true,powerPreference:"low-power"});
        renderer.setSize(W,H); renderer.setPixelRatio(Math.min(window.devicePixelRatio,1.5));
        renderer.setClearColor(0x000000,0); el.appendChild(renderer.domElement);

        const scene=new THREE.Scene();
        const camera=new THREE.PerspectiveCamera(48,W/H,0.1,200);
        camera.position.set(0,9,20); camera.lookAt(0,1,0);

        scene.add(new THREE.AmbientLight(0x001133,1.5));
        const dl=new THREE.DirectionalLight(0x00f0ff,0.7); dl.position.set(6,12,8); scene.add(dl);
        const dl2=new THREE.DirectionalLight(0xa855f7,0.4); dl2.position.set(-6,6,-4); scene.add(dl2);
        scene.add(new THREE.GridHelper(24,24,0x12122a,0x12122a));

        const sorted=[...tokens].sort((a,b)=>(parseFloat(b.volume?.h1)||0)-(parseFloat(a.volume?.h1)||0)).slice(0,6);
        const maxVol=sorted.reduce((m,t)=>Math.max(m,parseFloat(t.volume?.h1)||0),1);
        const COLORS=[0x00f0ff,0xa855f7,0x00ff88,0xffaa00,0xff3366,0xff6b35];
        const disposables=[];

        sorted.forEach((tok,i)=>{
          const p1=computeP1(tok);
          const h=Math.max(0.2,(( parseFloat(tok.volume?.h1)||0)/maxVol)*7);
          const col=COLORS[i%COLORS.length];
          const x=(i-(sorted.length-1)/2)*3.5;

          const geo=new THREE.BoxGeometry(1.4,h,1.4);
          const mat=new THREE.MeshPhongMaterial({color:col,emissive:col,emissiveIntensity:0.25,transparent:true,opacity:0.82});
          const mesh=new THREE.Mesh(geo,mat); mesh.position.set(x,h/2,0);
          scene.add(mesh); disposables.push(geo,mat);

          const sh=Math.max(0.1,(p1.score/100)*5);
          const sgeo=new THREE.BoxGeometry(0.25,sh,0.25);
          const smat=new THREE.MeshPhongMaterial({color:0xffffff,emissive:0xffffff,emissiveIntensity:0.8,transparent:true,opacity:0.55});
          const smesh=new THREE.Mesh(sgeo,smat); smesh.position.set(x,h+sh/2+0.05,0);
          scene.add(smesh); disposables.push(sgeo,smat);

          if(p1.momentum>70){
            const rgeo=new THREE.TorusGeometry(0.9,0.06,6,18);
            const rmat=new THREE.MeshPhongMaterial({color:0xff6b35,emissive:0xff6b35,emissiveIntensity:0.6,transparent:true,opacity:0.7});
            const rmesh=new THREE.Mesh(rgeo,rmat); rmesh.position.set(x,h+0.1,0); rmesh.rotation.x=Math.PI/2;
            scene.add(rmesh); disposables.push(rgeo,rmat);
          }
        });

        let frameId, angle=0;
        const animate=()=>{ frameId=requestAnimationFrame(animate); angle+=0.003; camera.position.x=Math.sin(angle)*20; camera.position.z=Math.cos(angle)*20; camera.lookAt(0,2,0); renderer.render(scene,camera); };
        animate();

        const onResize=()=>{ const W2=el.clientWidth,H2=el.clientHeight; if(!W2||!H2)return; camera.aspect=W2/H2; camera.updateProjectionMatrix(); renderer.setSize(W2,H2); };
        window.addEventListener("resize",onResize);

        return()=>{ cancelAnimationFrame(frameId); window.removeEventListener("resize",onResize); disposables.forEach(d=>d.dispose?.()); renderer.dispose(); if(el.contains(renderer.domElement))el.removeChild(renderer.domElement); };
      },[tokens]);
      return <div ref={mountRef} className="telemetry-container" />;
    }

    /* ═══════════════════════════════════
       MAIN APP
    ═══════════════════════════════════ */
    function App(){
      const [tokens,       setTokens]       = useState([]);
      const [loading,      setLoading]      = useState(true);
      const [error,        setError]        = useState(null);
      const [errorType,    setErrorType]    = useState(null);
      const [isStale,      setIsStale]      = useState(false);
      const [refreshSec,   setRefreshSec]   = useState(30);
      const [minP1,        setMinP1]        = useState(0);
      const [sortKey,      setSortKey]      = useState("p1");
      const [showTelemetry,setShowTelemetry]= useState(false);
      const [showAdmin,    setShowAdmin]    = useState(false);
      const [elapsed,      setElapsed]      = useState(null);
      const [fetchStats,   setFetchStats]   = useState({source:"—",proxied:false,latency:null,fetchCount:0,errorCount:0,lastFetch:null});

      const [logs, dispatchLog] = useReducer(logReducer,[]);
      const log = useCallback((level,msg)=>dispatchLog({type:"add",level,msg}),[]);

      // Use ref for fetch count to avoid stale closure in useCallback
      const fetchCountRef = useRef(0);
      const timerRef      = useRef(null);
      const staleRef      = useRef(null);
      const tickRef       = useRef(null);
      const lastFetchTs   = useRef(null);
      const refreshSecRef = useRef(refreshSec);
      useEffect(()=>{ refreshSecRef.current=refreshSec; },[refreshSec]);

      const fetchTokens = useCallback(async()=>{
        setLoading(true); setError(null); setErrorType(null); setIsStale(false);
        clearTimeout(staleRef.current);
        fetchCountRef.current += 1;
        log("admin",`Fetch #${fetchCountRef.current} — session ${SESSION.id}`);

        const result = await fetchAllEndpoints(log);

        setFetchStats(prev=>({
          source:     result.source||"—",
          proxied:    result.proxied||false,
          latency:    result.latency||null,
          fetchCount: prev.fetchCount+1,
          errorCount: result.ok ? prev.errorCount : prev.errorCount+1,
          lastFetch:  Date.now(),
        }));

        if(result.ok){
          const pairs=normalisePairs(result.data);
          if(pairs.length>0){
            setTokens(pairs); setError(null); setErrorType(null);
            lastFetchTs.current=Date.now();
            setLoading(false);
            staleRef.current=setTimeout(()=>setIsStale(true),refreshSecRef.current*2*1000);
            log("ok",`✓ ${pairs.length} tokens · ${result.source}${result.proxied?" (proxied)":""} · ${result.latency}ms — VERIFIED LIVE`);
            return;
          }
          log("err",`Response OK but 0 valid Solana pairs returned (endpoint: ${result.source})`);
          setError("API returned 0 valid token pairs for Solana");
          setErrorType("parse");
        }else{
          log("err",`All sources failed: ${result.error}`);
          setError(result.error||"No data");
          setErrorType(classifyError(result.error));
        }

        // Hard error — NO mock fallback
        setTokens([]);
        lastFetchTs.current=Date.now();
        setLoading(false);
      },[log]);

      // Initial fetch
      useEffect(()=>{ fetchTokens(); },[]);  // eslint-disable-line

      // Auto-refresh — stable interval, doesn't reset on every fetch
      useEffect(()=>{
        clearInterval(timerRef.current);
        timerRef.current=setInterval(()=>fetchTokens(),refreshSec*1000);
        return()=>clearInterval(timerRef.current);
      },[refreshSec]);  // eslint-disable-line

      // Elapsed ticker
      useEffect(()=>{
        tickRef.current=setInterval(()=>{ if(lastFetchTs.current)setElapsed(Math.round((Date.now()-lastFetchTs.current)/1000)); },1000);
        return()=>{ clearInterval(tickRef.current); clearTimeout(staleRef.current); };
      },[]);

      const processed=useMemo(()=>tokens
        .map(t=>({...t,_p1:computeP1(t)}))
        .filter(t=>t._p1.score>=minP1)
        .sort((a,b)=>{
          if(sortKey==="p1")       return b._p1.score-a._p1.score;
          if(sortKey==="vol")      return(parseFloat(b.volume?.h24)||0)-(parseFloat(a.volume?.h24)||0);
          if(sortKey==="price")    return(parseFloat(b.priceChange?.m5)||0)-(parseFloat(a.priceChange?.m5)||0);
          if(sortKey==="liq")      return(parseFloat(b.liquidity?.usd)||0)-(parseFloat(a.liquidity?.usd)||0);
          if(sortKey==="momentum") return b._p1.momentum-a._p1.momentum;
          return 0;
        }),[tokens,minP1,sortKey]);

      const topP1=processed[0]?._p1?.score??0;
      const avgP1=processed.length?Math.round(processed.reduce((s,t)=>s+t._p1.score,0)/processed.length):0;
      const surgeCount=processed.filter(t=>t._p1.score>=70).length;
      const momCount=processed.filter(t=>t._p1.momentum>70).length;

      const dotClass=loading?"dot-warn":error?"dot-dead":"dot-live";
      const hasError=!loading&&!!error;

      return(
        <div style={{maxWidth:1140,margin:"0 auto",padding:"0.75rem 0.75rem 3rem"}}>

          {/* ── Header ── */}
          <div className="flex items-center justify-between mb-3" style={{paddingTop:"0.5rem",flexWrap:"wrap",gap:"0.5rem"}}>
            <div>
              <h1 className="text-2xl font-bold surge-glow cyan" style={{letterSpacing:"-0.5px"}}>◈ SOLANA SURGE SCANNER</h1>
              <div className="flex items-center gap-2 mt-1 text-xs muted">
                <div className={dotClass}/>
                {loading
                  ? <span className="amber">Fetching…</span>
                  : hasError
                    ? <span className="red">DATA ERROR</span>
                    : <span className="green">LIVE VERIFIED</span>
                }
                <span className="dim">·</span>
                <span>{processed.length} tokens</span>
                <span className="dim">·</span>
                <span>P1 {VERSION.p1}</span>
                {elapsed!=null&&!loading&&!hasError&&<><span className="dim">·</span><span>{elapsed}s ago</span></>}
              </div>
            </div>
            <div className="flex gap-2">
              <button className="btn btn-purple" onClick={()=>setShowAdmin(v=>!v)}>{showAdmin?"▼ Admin":"▲ Admin"}</button>
              <button className="btn btn-cyan"   onClick={fetchTokens} disabled={loading}>{loading?"Loading…":"↺ Refresh"}</button>
            </div>
          </div>

          {/* ── Banners ── */}
          {hasError&&(
            <div className="banner banner-err">
              <strong className="red">✗ NO LIVE DATA</strong>
              {` — ${({cors:"CORS blocked",network:"No network",timeout:"Timed out",http:"Server error",parse:"Parse/integrity error",unknown:"Unknown error"})[errorType]||errorType||"All endpoints exhausted"} — Retry or check network`}
            </div>
          )}
          {!hasError&&!loading&&fetchStats.proxied&&(
            <div className="banner banner-cors">
              <strong className="cyan">ℹ CORS PROXY</strong>
              {` — via proxy · source: ${fetchStats.source} · ${fetchStats.latency}ms · LIVE DATA`}
            </div>
          )}
          {isStale&&!loading&&!hasError&&(
            <div className="banner banner-stale">
              <strong className="amber">⏱ STALE</strong>
              {` — No update in ${refreshSec*2}s — check connection or lower interval`}
            </div>
          )}
          {!hasError&&!loading&&!fetchStats.proxied&&(
            <div className="banner banner-ok">
              <strong className="green">✓ LIVE DATA</strong>
              {` — ${fetchStats.source} · ${fetchStats.latency}ms · ${fmtTime(fetchStats.lastFetch)} — DexScreener verified`}
            </div>
          )}

          {/* ── Admin Panel ── */}
          {showAdmin&&(
            <AdminPanel stats={fetchStats} logs={logs} tokens={tokens}
              onClearLogs={()=>dispatchLog({type:"clear"})}
              onForceRefresh={fetchTokens} />
          )}

          {/* ── Stats strip (only when we have data) ── */}
          {!hasError&&tokens.length>0&&(
            <div className="grid-4 mb-3">
              {[
                {label:"Top P1",       value:topP1,      color:"var(--cyan)"},
                {label:"Avg P1",       value:avgP1,      color:"var(--purple)"},
                {label:"Surge Alerts", value:surgeCount, color:"var(--green)"},
                {label:"High Momentum",value:momCount,   color:"var(--orange)"},
              ].map(s=>(
                <div key={s.label} className="panel p-3 text-center">
                  <div className="panel-top-line"/>
                  <div className="text-xl font-bold" style={{color:s.color,marginTop:"0.25rem"}}>{s.value}</div>
                  <div className="text-xs muted mt-1">{s.label}</div>
                </div>
              ))}
            </div>
          )}

          {/* ── Controls (only when we have data) ── */}
          {!hasError&&tokens.length>0&&(
            <div className="panel p-4 mb-3">
              <div className="panel-top-line"/>
              <div className="grid-3" style={{marginTop:"0.5rem"}}>
                <div>
                  <label className="text-xs muted" style={{display:"block",marginBottom:"0.3rem"}}>Sort by</label>
                  <select value={sortKey} onChange={e=>setSortKey(e.target.value)}>
                    <option value="p1">P1 Score</option>
                    <option value="momentum">Momentum</option>
                    <option value="vol">Volume 24h</option>
                    <option value="price">Price Δ 5m</option>
                    <option value="liq">Liquidity</option>
                  </select>
                </div>
                <div>
                  <label className="text-xs muted" style={{display:"block",marginBottom:"0.3rem"}}>Min P1: <span className="cyan">{minP1}</span></label>
                  <input type="range" min="0" max="90" step="5" value={minP1} onChange={e=>setMinP1(Number(e.target.value))} />
                </div>
                <div>
                  <label className="text-xs muted" style={{display:"block",marginBottom:"0.3rem"}}>Refresh: <span className="cyan">{refreshSec}s</span></label>
                  <input type="range" min="10" max="120" step="5" value={refreshSec} onChange={e=>setRefreshSec(Number(e.target.value))} />
                </div>
              </div>
              <div className="flex gap-2 mt-3" style={{flexWrap:"wrap"}}>
                <button className={`btn ${showTelemetry?"btn-purple":"btn-cyan"}`} onClick={()=>setShowTelemetry(v=>!v)}>
                  {showTelemetry?"▼ Hide 3D":"▲ Show 3D Telemetry"}
                </button>
                <span className="text-xs muted" style={{alignSelf:"center"}}>
                  Rate limit: <span className={RateLimit.remaining()<5?"red":"amber"}>{RateLimit.remaining()}</span>/30 remaining
                </span>
              </div>
            </div>
          )}

          {/* ── 3D Telemetry ── */}
          {showTelemetry&&tokens.length>0&&(
            <div className="mb-3">
              <div className="text-xs muted mb-1">3D vol chart · top 6 by h1 · white needle = P1 score · orange torus = momentum &gt;70</div>
              <Telemetry3D tokens={tokens} />
            </div>
          )}

          {/* ── Main content area ── */}
          {loading&&tokens.length===0?(
            <div className="panel p-6 text-center cyan">
              <div className="text-lg mb-2 surge-glow">◈</div>
              <div className="text-xs" style={{color:"var(--amber)"}}>Scanning Solana network…</div>
              <div className="text-xs muted mt-2">
                Trying {Object.keys(ENDPOINTS).length} endpoints · {PROXIES.length} proxy fallbacks per endpoint
              </div>
            </div>
          ):hasError?(
            <ErrorScreen
              error={error}
              errorType={errorType}
              onRetry={fetchTokens}
              fetchCount={fetchCountRef.current}
              logs={logs}
            />
          ):processed.length===0?(
            <div className="panel p-6 text-center muted">
              No tokens match Min P1 ≥ {minP1}. Lower the threshold.
            </div>
          ):(
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(295px,1fr))",gap:"0.65rem"}}>
              {processed.map((pair,i)=>(
                <TokenCard key={pair.pairAddress||pair.baseToken?.address||i} pair={pair} rank={i+1} />
              ))}
            </div>
          )}

          {/* ── Footer ── */}
          <div className="text-xs muted mt-4" style={{textAlign:"center",opacity:0.35}}>
            Solana Surge Scanner {VERSION.app} · P1 {VERSION.p1} · Source: DexScreener API ·
            Session {SESSION.id} · Live data only · Not financial advice
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
