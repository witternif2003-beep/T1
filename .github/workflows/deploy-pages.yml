name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ── Solana Surge Scanner (root) ──
      - name: Install T1 dependencies
        run: npm ci

      - name: Build Solana scanner
        run: npm run build

      # ── NYSE Stock Surge Detector (stock/) ──
      - name: Install stock/ dependencies
        run: npm ci
        working-directory: stock

      - name: Build NYSE stock app
        run: npm run build
        working-directory: stock

      # ── Merge: place stock build inside Solana build output ──
      - name: Merge dist outputs + ensure .nojekyll at root
        run: |
          mkdir -p dist/stock
          cp -r stock/dist/. dist/stock/
          # Ensure root .nojekyll exists (bypasses GitHub Pages Jekyll runner)
          touch dist/.nojekyll
          echo "dist/ root:"
          ls -la dist/
          echo "dist/stock/:"
          ls dist/stock/

      # ── Push combined dist/ to gh-pages branch ──
      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          clean: true
          commit-message: "deploy: Solana + Stock from ${{ github.sha }}"
          git-config-name: github-actions[bot]
          git-config-email: github-actions[bot]@users.noreply.github.com
          force: true
